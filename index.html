<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="Stagies Berlin e.V. – Musicalverein Berlin. Wir singen, schauspielern und tanzen. Jetzt Tickets für Come From Away sichern!" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StageInk - Musical Verein Berlin</title>

    <!-- Preconnect to both Google Fonts hosts before any other fetches -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Load font CSS directly from HTML so the woff2 URLs are discovered in one hop,
         not three (HTML → app.css → Google Fonts CSS → woff2) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap">

    <!-- Preload the above-the-fold logo so it doesn't wait for JS -->
    <link rel="preload" as="image" href="/images/logo.svg" fetchpriority="high">

    <link rel="icon" href="/favicon.ico" sizes="32x32">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/favicon.png">
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
